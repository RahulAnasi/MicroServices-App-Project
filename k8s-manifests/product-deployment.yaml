apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-container
        image: product-service
        imagePullPolicy: Never

        ports:
        - containerPort: 3001
